<!DOCTYPE html>
<html lang = "pt-BR">
<head>
  <meta charset = "UTF-8" />
  <meta name = "viewport" content = "width=device-width, initial-scale=1.0" />
  <title> Gerador de Senha - Auditor de Senhas</title>
  <link rel = "stylesheet" href = "CSS/Style.css" />
</head>
<body>
  <div class = "container">
    <div class = "card">
      <h1> Gerador de Senha </h1>
      <p class = "subtitle"> Auditor de força de senha para portfólio de cibersegurança </p>

      <div clas = "password-box">
        <input type = "password" id = "passwordInput" placeholder = "Digite sua senha..." />
        <button id = "togglePassword"> Mostrar </button>
      </div>

      <div class = "strength-meter">
        <div id = "strengthBar"> </div>
      </div>

      <p id="strengthText"> Força: Nenhuma </p>

      <ul id="criteriaList">
        <li id="length">❌ Pelo menos 8 caracteres</li>
        <li id="uppercase">❌ Letra maiúscula</li>
        <li id="lowercase">❌ Letra minúscula</li>
        <li id="number">❌ Número</li>
        <li id="special">❌ Caractere especial</li>
        <li id="common">❌ Não pode ser senha comum</li>
      </ul>

      <button id = "generatePassword"> Gerar Senha Segura </button>

      <div class = "generated-box">
        <input type="text" id = generatedPassword" readonly placeholder = "Sua senha gerada aparecerá aqui" />
      </div>
    </div>
  </div>

  <script src = "script.js"> </script>
</body>
</html>
